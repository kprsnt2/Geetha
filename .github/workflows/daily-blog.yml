name: Daily Gita Blog Generation

on:
  schedule:
    # Run at midnight IST (18:30 UTC previous day)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily blog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-generate.js

      - name: Checkpoint database
        run: node scripts/checkpoint-db.js

      - name: Commit and push changes
        run: |
          git config user.name "Gita Bot 🙏"
          git config user.email "bot@geetha.app"
          git add data/geetha.db blog_drafts/published/
          git diff --staged --quiet || (git commit -m "🕉️ Daily shloka blog - $(date -u '+%Y-%m-%d')" && git push)
